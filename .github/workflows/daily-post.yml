name: Daily Blog Post

on:
  schedule:
    - cron: '0 15 * * *'  # Every day at 7:00 AM PST (15:00 UTC)
  workflow_dispatch: {}   # Manual trigger

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Generate daily blog post
        run: node generate-post.mjs
        working-directory: scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ sitemap.xml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily post: $(date +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,scripts/node_modules'
